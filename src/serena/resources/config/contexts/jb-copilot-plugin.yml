description: Generic IDE coding agent context (basic file operations and shell operations assumed to be covered; single project mode)
prompt: |
  In addition to Serena's tools, you have access to internal tools, including for, basic (line-based) edits and reads, 
  and shell commands.
  
  If Serena's tools can be used to achieve your task, you should prioritize them.
  In particular, it is important that you avoid reading entire source code files unless it is strictly necessary!
  Instead, for exploring and reading code in a token-efficient manner, use Serena's overview and symbolic search tools.
  For non-code files or for reads where you don't know the symbol's name path, you can use the pattern search tool.
  
  Make sure to first activate the working directory as using Serena's `activate_project` tool and to read initial
  instructions (if not done so already) with the `initial_instructions` tool.

excluded_tools: []

included_optional_tools:
  - delete_lines
  - insert_at_line
  - replace_lines
  - restart_language_server
  - open_dashboard
  - list_queryable_projects
  - query_project
  - remove_project
  - think_about_collected_information
  - think_about_task_adherence
  - think_about_whether_you_are_done
  - jet_brains_find_declaration
  - jet_brains_find_implementations
  - jet_brains_find_referencing_symbols
  - jet_brains_find_symbol
  - jet_brains_get_symbols_overview
  - jet_brains_inline_symbol
  - jet_brains_move
  - jet_brains_rename
  - jet_brains_safe_delete
  - jet_brains_type_hierarchy

tool_description_overrides: {}

# Single-project mode is OFF in this fork: activate_project + project-management tools are surfaced.
single_project: false
